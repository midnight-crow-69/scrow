#!/usr/bin/nft -f
# Hardened nftables firewall
# Place in /etc/nftables.conf

flush ruleset

table inet filter {
    # Rate limiting set
    set ratelimit {
        type ipv4_addr
        flags dynamic, timeout
        timeout 60s
    }

    set blacklisted {
        type ipv4_addr
        flags dynamic, timeout
        timeout 3600s
    }

    chain input {
        type filter hook input priority filter; policy drop;

        # Allow established/related
        ct state {established, related} accept

        # Drop invalid
        ct state invalid drop

        # Loopback
        iif lo accept

        # ICMP (rate limited)
        meta l4proto icmp limit rate 10/second accept
        meta l4proto icmpv6 limit rate 10/second accept

        # Block blacklisted IPs
        ip saddr @blacklisted counter drop

        # SSH (rate limited - 3 attempts per minute)
        tcp dport ssh meter ssh_meter { ip saddr limit rate 3/minute burst 5 packets } accept
        tcp dport ssh counter add @blacklisted { ip saddr limit rate over 10/minute }

        # Block common attack ports
        tcp dport { 23, 111, 135, 139, 445, 1433, 1434, 3306, 3389, 5900, 6379, 8443, 9200 } counter drop
        udp dport { 23, 111, 135, 137, 138, 139, 445, 1434, 1900, 5000, 6379 } counter drop

        # Log dropped packets (rate limited)
        limit rate 5/minute log prefix "NFT-DROP: " level warn

        # Default drop counter
        counter
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}
